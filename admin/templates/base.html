<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}EGE Bot Admin{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f6fa; color: #222; }
    nav { background: #2c3e50; color: #fff; padding: 0.75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: #ecf0f1; text-decoration: none; font-size: 0.95rem; }
    nav a:hover { text-decoration: underline; }
    nav .brand { font-weight: 700; font-size: 1.1rem; margin-right: auto; }
    main { max-width: 1100px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.6rem; margin-bottom: 1.25rem; }
    h2 { font-size: 1.2rem; margin: 1.5rem 0 0.75rem; }
    table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 6px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    th, td { padding: 0.6rem 0.9rem; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
    th { background: #34495e; color: #fff; font-weight: 600; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f0f3f7; }
    .card { background: #fff; border-radius: 6px; padding: 1.25rem 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 1rem; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: #fff; border-radius: 6px; padding: 1rem 1.25rem; box-shadow: 0 1px 4px rgba(0,0,0,.08); text-align: center; }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #2c3e50; }
    .stat-card .label { font-size: 0.8rem; color: #666; margin-top: 0.25rem; }
    .btn { display: inline-block; padding: 0.4rem 0.9rem; border-radius: 4px; border: none; cursor: pointer; font-size: 0.875rem; text-decoration: none; }
    .btn-primary { background: #2980b9; color: #fff; }
    .btn-primary:hover { background: #2471a3; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #a93226; }
    .btn-secondary { background: #7f8c8d; color: #fff; }
    .btn-secondary:hover { background: #6c7a7d; }
    .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.8rem; }
    form.inline { display: inline; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 3px; font-size: 0.75rem; font-weight: 600; }
    .badge-active { background: #d5f5e3; color: #1e8449; }
    .badge-inactive { background: #fde8e8; color: #922b21; }
    .error-list { background: #fde8e8; border-left: 4px solid #c0392b; padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    .error-list li { margin-left: 1.2rem; font-size: 0.875rem; }
    .success-msg { background: #d5f5e3; border-left: 4px solid #1e8449; padding: 0.75rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    input[type=text], input[type=number], select, textarea { width: 100%; padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; margin-top: 0.25rem; }
    label { font-size: 0.85rem; font-weight: 600; color: #444; display: block; margin-top: 0.75rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  </style>
</head>
<body>
<nav>
  <span class="brand">EGE Bot Admin</span>
  <a href="/admin">Дашборд</a>
  <a href="/admin/words">Слова</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
